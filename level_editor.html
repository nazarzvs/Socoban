<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Sokoban Editor (Scratch Sync)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; flex-direction: column; align-items: center; background: #2c3e50; color: white; }
        .controls { margin: 20px; padding: 20px; background: #34495e; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .grid { display: grid; gap: 1px; background: #7f8c8d; border: 4px solid #2c3e50; }
        .cell { width: 40px; height: 40px; cursor: pointer; display: flex; align-items: center; justify-content: center; background: #95a5a6; user-select: none; transition: 0.1s; }
        .cell:hover { filter: brightness(1.2); }
        
        /* Стили плиток под твои скриншоты */
        .cell[data-type="0"] { background: #76b947; } /* Трава */
        .cell[data-type="1"] { background: #a1887f; border: 2px inset #5d4037; box-sizing: border-box; } /* Стена */
        .cell[data-type="2"] { background: #76b947; } 
        .cell[data-type="2"]::after { content: '📦'; font-size: 24px; } /* Ящик */
        .cell[data-type="3"] { background: #76b947; position: relative; } 
        .cell[data-type="3"]::after { content: ''; width: 12px; height: 12px; background: #5d4037; border-radius: 50%; opacity: 0.5; } /* Цель */
        .cell[data-type="4"] { background: #76b947; } 
        .cell[data-type="4"]::after { content: '👷'; font-size: 24px; } /* Игрок */

        .palette { display: flex; gap: 10px; margin-bottom: 20px; justify-content: center; }
        .tool { padding: 10px 15px; background: #ecf0f1; color: #2c3e50; cursor: pointer; border-radius: 6px; font-weight: bold; border: 3px solid transparent; }
        .tool.active { border-color: #3498db; background: #3498db; color: white; }
        
        input { padding: 5px; border-radius: 4px; border: none; width: 60px; text-align: center; }
        textarea { width: 90%; max-width: 800px; height: 100px; margin-top: 20px; border-radius: 8px; padding: 10px; font-family: monospace; }
        button { padding: 10px 20px; background: #27ae60; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin: 5px; }
        button:hover { background: #2ecc71; }
    </style>
</head>
<body>

    <h2>🎮 Редактор уровней для Scratch</h2>

    <div class="controls">
        <div class="palette" id="palette">
            <div class="tool active" data-val="1">🧱 Стена</div>
            <div class="tool" data-val="2">📦 Ящик</div>
            <div class="tool" data-val="3">🎯 Цель</div>
            <div class="tool" data-val="4">👷 Игрок</div>
            <div class="tool" data-val="0">🌿 Трава</div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
            <div>Ширина (cols): <input type="number" id="cols" value="10"></div>
            <div>Высота (rows): <input type="number" id="rows" value="10"></div>
            <div>Смещение X: <input type="number" id="offX" value="-5"></div>
            <div>Смещение Y: <input type="number" id="offY" value="-5"></div>
        </div>
        <div style="text-align: center; margin-top: 15px;">
            <button onclick="createGrid()">🔄 Пересоздать поле</button>
        </div>
    </div>

    <div class="grid" id="grid"></div>

    <textarea id="output" readonly></textarea>
    <button onclick="copyToClipboard()">📋 Копировать код уровня</button>

    <script>
        let currentBrush = "1";
        const grid = document.getElementById('grid');
        const output = document.getElementById('output');

        document.getElementById('palette').addEventListener('click', e => {
            if(e.target.classList.contains('tool')) {
                document.querySelectorAll('.tool').forEach(t => t.classList.remove('active'));
                e.target.classList.add('active');
                currentBrush = e.target.dataset.val;
            }
        });

        function createGrid() {
            const cols = parseInt(document.getElementById('cols').value);
            const rows = parseInt(document.getElementById('rows').value);
            grid.style.gridTemplateColumns = `repeat(${cols}, 40px)`;
            grid.innerHTML = '';

            // Создаем сетку: сверху вниз, слева направо
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.type = (r === 0 || r === rows-1 || c === 0 || c === cols-1) ? "1" : "0";
                    cell.addEventListener('mousedown', fillCell);
                    cell.addEventListener('mouseover', e => { if(e.buttons === 1) fillCell(e); });
                    grid.appendChild(cell);
                }
            }
            generateCode();
        }

        function fillCell(e) {
            if (currentBrush === "4") {
                document.querySelectorAll('.cell[data-type="4"]').forEach(c => c.dataset.type = "0");
            }
            e.target.dataset.type = currentBrush;
            generateCode();
        }

        function generateCode() {
            const x = document.getElementById('offX').value;
			const y = document.getElementById('offY').value;
			const cols = parseInt(document.getElementById('cols').value);
			const rows = parseInt(document.getElementById('rows').value);
			
			// 1. Получаем плоский массив всех ячеек
			const allCells = Array.from(document.querySelectorAll('.cell')).map(c => c.dataset.type);
			
			// 2. Разбиваем на подмассивы (строки)
			let rowsArray = [];
			for (let i = 0; i < allCells.length; i += cols) {
				rowsArray.push(allCells.slice(i, i + cols));
			}
			
			// 3. Переворачиваем порядок строк (последняя становится первой)
			// и объединяем всё обратно в одну строку через запятую
			const reversedCells = rowsArray.reverse().flat();
			
			output.value = `${x},${y},${cols},${rows},${reversedCells.join(',')}`;
        }

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert('Данные скопированы для Scratch!');
        }

        createGrid();
        ['offX', 'offY', 'cols', 'rows'].forEach(id => {
            document.getElementById(id).addEventListener('input', generateCode);
        });
    </script>
</body>
</html>
